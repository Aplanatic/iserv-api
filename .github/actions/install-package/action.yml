name: Install versioned IServ API package
description: Install the canonical SDK artifact for consumer CI without registry credentials
runs:
  using: composite
  steps:
    - name: Stage API package
      shell: bash
      run: |
        node -e "const fs=require('node:fs');const path=require('node:path');fs.mkdirSync('.aplanatic-ci',{recursive:true});fs.copyFileSync(path.join(process.env.GITHUB_ACTION_PATH,'aplanatic-iserv-api-1.7.2.tgz'),path.join('.aplanatic-ci','iserv-api.tgz'))"
        npm pkg set 'dependencies.@aplanatic/iserv-api=file:.aplanatic-ci/iserv-api.tgz'
    - name: Install dependencies
      shell: bash
      run: npm install --package-lock=false
