name: Upstream monitor

on:
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check official documentation availability
        run: |
          for url in \
            https://doku.iserv.de/cookbook/app/ \
            https://doku.iserv.de/cookbook/external/webdav/ \
            https://doku.iserv.de/modules/calendar/; do
            curl --fail --silent --show-error --location --max-time 30 --output /dev/null "$url"
          done
      - name: Check selected upstream
        id: upstream
        shell: bash
        run: |
          git fetch --quiet https://github.com/YONN2222/IservAPI.git main:refs/remotes/source/main
          if git merge-base --is-ancestor refs/remotes/source/main HEAD; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi
      - name: Open sanitized update issue
        if: steps.upstream.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --state open --search 'Upstream SDK update available in:title' --json number --jq 'length')
          if [ "$existing" = 0 ]; then
            gh issue create \
              --title 'Upstream SDK update available' \
              --body 'The weekly monitor found new commits in the attributed public SDK. Review route and authentication metadata; do not attach live instance captures.'
          fi
